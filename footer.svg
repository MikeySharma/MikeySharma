<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="100%" height="100%">
  <defs>
    <linearGradient id="footerBg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#05040a"/>
      <stop offset="50%" style="stop-color:#0f0c20"/>
      <stop offset="100%" style="stop-color:#140f29"/>
    </linearGradient>

    <linearGradient id="techAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/> <stop offset="50%" style="stop-color:#a855f7"/> <stop offset="100%" style="stop-color:#ec4899"/> </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="120" fill="url(#footerBg)"/>

  <g stroke="#ffffff" stroke-width="1" opacity="0.03">
    <path d="M 0,30 L 900,30 M 0,60 L 900,60 M 0,90 L 900,90" />
    <path d="M 150,0 L 150,120 M 300,0 L 300,120 M 450,0 L 450,120 M 600,0 L 600,120 M 750,0 L 750,120" />
  </g>

  <rect x="0" y="0" width="900" height="2" fill="url(#techAccent)" opacity="0.4" />

  <g opacity="0.12">
    <path d="M-100,-20 C200,60 300,120 500,40 C700,-40 750,80 1000,-10 L1000,-20 Z" fill="url(#techAccent)"/>
    <path d="M-100,-20 C100,110 350,20 550,70 C700,110 850,0 1000,30 L1000,-20 Z" fill="url(#techAccent)" opacity="0.6"/>
  </g>

  <circle cx="220" cy="45" r="3" fill="#6366f1" opacity="0.5" filter="url(#glow)"/>
  <circle cx="680" cy="75" r="3.5" fill="#a855f7" opacity="0.4" filter="url(#glow)"/>
  <circle cx="120" cy="85" r="2" fill="#ec4899" opacity="0.3"/>
  <circle cx="800" cy="30" r="1.5" fill="#6366f1" opacity="0.4"/>
</svg>
