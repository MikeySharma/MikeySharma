<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080711"/>
      <stop offset="50%" style="stop-color:#0f0c20"/>
      <stop offset="100%" style="stop-color:#15102a"/>
    </linearGradient>

    <linearGradient id="techAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/> <stop offset="50%" style="stop-color:#a855f7"/> <stop offset="100%" style="stop-color:#ec4899"/> </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgGradient)"/>

  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <path d="M 0,40 L 900,40 M 0,80 L 900,80 M 0,120 L 900,120 M 0,160 L 900,160" />
    <path d="M 150,0 L 150,200 M 300,0 L 300,200 M 450,0 L 450,200 M 600,0 L 600,200 M 750,0 L 750,200" />
  </g>

  <g opacity="0.15">
    <path d="M-100,220 C200,120 250,50 450,130 C650,210 700,60 1000,160 L1000,220 Z" fill="url(#techAccent)"/>
    <path d="M-100,190 C150,60 350,160 550,80 C750,0 800,140 1000,110 L1000,220 Z" fill="url(#techAccent)" opacity="0.5"/>
  </g>

  <circle cx="150" cy="60" r="3" fill="#6366f1" opacity="0.6" filter="url(#glow)"/>
  <circle cx="780" cy="140" r="4" fill="#ec4899" opacity="0.4" filter="url(#glow)"/>
  <circle cx="820" cy="50" r="2" fill="#a855f7" opacity="0.5"/>

  <g id="brand-text">
    <text x="450" y="95" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="46" 
          font-weight="800" 
          fill="#ffffff" 
          text-anchor="middle" 
          letter-spacing="1.5">Mikey Sharma</text>
    
    <text x="450" y="135" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-size="14" 
          font-weight="600" 
          fill="#a5b4fc" 
          text-anchor="middle" 
          letter-spacing="4" 
          opacity="0.9">SOFTWARE ENGINEER &amp; AI/ML SPECIALIST</text>
  </g>

  <rect x="350" y="160" width="200" height="2" rx="1" fill="url(#techAccent)" opacity="0.8" />
</svg>
